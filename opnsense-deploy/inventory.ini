# =============================================================================
# Inventaire pour le deploiement de la VM OPNsense
# =============================================================================
# Cible : pve-01 (qui hebergera la VM 100 OPNsense)
# Utilise l'IP admin stable 192.168.3.21
# =============================================================================

[pve_master]
pve-01 ansible_host=192.168.1.69

[pve_master:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/proxmox_lab
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
