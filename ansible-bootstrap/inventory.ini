# =============================================================================
# Inventaire bootstrap Proxmox - PHASE INITIALE
# =============================================================================
# Les 3 PVE sont actuellement joignables sur leur IP DHCP du LAN domestique :
#   pve-01 : 192.168.1.69
#   pve-02 : 192.168.1.151
#   pve-03 : 192.168.1.38
#
# Apres execution du playbook, ils auront leur IP finale sur le reseau de
# management (vmbr0) :
#   pve-01 : 192.168.3.21
#   pve-02 : 192.168.3.22
#   pve-03 : 192.168.3.23
# =============================================================================

[pve_nodes]
pve-01 ansible_host=192.168.80.133 node_id=1
pve-02 ansible_host=192.168.80.134node_id=2
pve-03 ansible_host=192.168.80.135 node_id=3

pve-01 ansible_host=192.168.3.21 node_id=1
pve-02 ansible_host=192.168.3.22 node_id=2
pve-03 ansible_host=192.168.3.23 node_id=3

[pve_nodes:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/proxmox_lab
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[cluster_master]
pve-01

[cluster_slaves]
pve-02
pve-03
